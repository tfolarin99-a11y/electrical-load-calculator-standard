<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ElectraSuite — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cp: #1a3a5c;
      --ca: #f59e0b;
      --cbg: #f8fafc;
      --csf: #fff;
      --cbr: #e2e8f0;
      --ct: #1e293b;
      --cm: #64748b;
    }

    body { font-family: 'DM Sans', sans-serif; background: var(--cbg); }

    /* AUTH LOADING SCREEN */
    #authScreen {
      position: fixed;
      inset: 0;
      background: #0c1117;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      z-index: 9999;
      transition: opacity 0.4s;
    }

    #authScreen .logo {
      width: 52px; height: 52px;
      background: var(--ca);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(245,158,11,0.4); }
      50% { transform: scale(1.05); box-shadow: 0 0 0 12px rgba(245,158,11,0); }
    }

    #authScreen p { color: #64748b; font-size: 13px; font-family: 'Space Mono', monospace; }

    #authScreen .sub {
      color: #374151;
      font-size: 11px;
      font-family: 'DM Sans', sans-serif;
      margin-top: -8px;
    }

    /* TOP NAV BAR */
    #topNav {
      background: var(--cp);
      padding: 0 20px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .nav-left { display: flex; align-items: center; gap: 10px; }

    .nav-logo {
      width: 28px; height: 28px;
      background: var(--ca);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 800;
    }

    .nav-brand { display: flex; flex-direction: column; gap: 1px; }
    .nav-title {
      font-family: 'Space Mono', monospace;
      font-size: 12px; font-weight: 700; color: #fff;
      letter-spacing: 0.3px; line-height: 1;
    }
    .nav-company {
      font-size: 9.5px; color: var(--ca);
      letter-spacing: 0.8px; text-transform: uppercase;
      font-weight: 600; line-height: 1;
    }

    .nav-right { display: flex; align-items: center; gap: 10px; }

    .help-link {
      display: flex; align-items: center; gap: 5px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      color: rgba(255,255,255,0.8);
      font-family: 'DM Sans', sans-serif;
      font-size: 11px; font-weight: 600;
      padding: 5px 11px; border-radius: 6px;
      text-decoration: none; transition: all 0.2s;
    }
    .help-link:hover {
      background: rgba(245,158,11,0.15);
      border-color: rgba(245,158,11,0.4);
      color: var(--ca);
    }

    .user-pill {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px; padding: 4px 12px 4px 6px;
    }

    .user-avatar {
      width: 26px; height: 26px; border-radius: 50%;
      background: var(--ca);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: var(--cp);
    }

    .user-email {
      font-size: 11px; color: rgba(255,255,255,0.8);
      max-width: 160px; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }

    .sign-out-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.75);
      font-family: 'DM Sans', sans-serif;
      font-size: 11px; font-weight: 600;
      padding: 5px 11px; border-radius: 6px;
      cursor: pointer; transition: all 0.2s;
    }
    .sign-out-btn:hover {
      background: rgba(239,68,68,0.2);
      border-color: rgba(239,68,68,0.4);
      color: #fca5a5;
    }

    #calcFrame { display: block; }
  </style>
</head>
<body>

  <!-- AUTH LOADING SCREEN -->
  <div id="authScreen">
    <div class="logo">⚡</div>
    <p>Loading calculator…</p>
    <span class="sub">Taewoo Digital</span>
  </div>

  <!-- TOP NAV (hidden until auth confirmed) -->
  <nav id="topNav" style="display:none">
    <div class="nav-left">
      <div class="nav-logo">⚡</div>
      <div class="nav-brand">
        <span class="nav-title">ElectraSuite</span>
        <span class="nav-company">Taewoo Digital</span>
      </div>
    </div>
    <div class="nav-right">
      <a class="help-link" href="/help/" target="_blank">❓ How to Use</a>
      <div class="user-pill">
        <div class="user-avatar" id="userInitials">?</div>
        <span class="user-email" id="userEmail">Loading…</span>
      </div>
      <button class="sign-out-btn" onclick="signOut()">Sign Out</button>
    </div>
  </nav>

  <!-- CALCULATOR APP -->
  <div id="calcFrame" style="display:none"></div>

  <script>
    const SUPABASE_URL = 'https://uxpgdaetneoaaevgjoai.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV4cGdkYWV0bmVvYWFldmdqb2FpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNDk2ODQsImV4cCI6MjA5NDkyNTY4NH0.srmK2um_dvrSKawcnZa3V1hAlzb1la27J8INUYjJV1Q';

    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true
      }
    });

    let appLoaded = false;

    async function signOut() {
      await sb.auth.signOut();
      window.location.href = '/auth/';
    }

    function showApp(user) {
      if (appLoaded) return;
      appLoaded = true;

      const name = user.user_metadata?.full_name || user.email || '';
      const initials = name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2) || '?';
      document.getElementById('userInitials').textContent = initials;
      document.getElementById('userEmail').textContent = user.email;

      const screen = document.getElementById('authScreen');
      screen.style.opacity = '0';
      setTimeout(() => {
        screen.style.display = 'none';
        document.getElementById('topNav').style.display = 'flex';
        document.getElementById('calcFrame').style.display = 'block';
        loadCalculator();
      }, 400);
    }

    function loadCalculator() {
      const frame = document.getElementById('calcFrame');

      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = '/style.css';
      document.head.appendChild(link);

      fetch('/index-calc.html')
        .then(r => {
          if (!r.ok) throw new Error('index-calc.html not found — status ' + r.status);
          return r.text();
        })
        .then(html => {
          frame.innerHTML = html;
          const s = document.createElement('script');
          s.src = '/script.js';
          s.onerror = () => {
            frame.innerHTML = '<div style="padding:24px;color:#dc2626;font-family:monospace">⚠ script.js failed to load. Check the file exists at the root of your repo.</div>';
          };
          document.body.appendChild(s);
        })
        .catch(err => {
          frame.innerHTML = `<div style="padding:24px;color:#dc2626;font-family:monospace">⚠ Calculator failed to load:<br><br>${err.message}<br><br>Check that index-calc.html and script.js exist at the root of your repo.</div>`;
        });
    }

    // ── PRIMARY AUTH CHECK ──
    // onAuthStateChange fires reliably once Supabase restores the session.
    // We use a timeout fallback: if no event fires within 4 seconds, redirect to login.
    let authResolved = false;

    const redirectTimer = setTimeout(() => {
      if (!authResolved) {
        window.location.href = '/auth/';
      }
    }, 4000);

    sb.auth.onAuthStateChange((event, session) => {
      authResolved = true;
      clearTimeout(redirectTimer);

      if (event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED' || event === 'INITIAL_SESSION') {
        if (session && session.user) {
          showApp(session.user);
        } else {
          window.location.href = '/auth/';
        }
      } else if (event === 'SIGNED_OUT') {
        window.location.href = '/auth/';
      }
    });

    // Also try getSession immediately as a fast path —
    // if session is already in storage this resolves before onAuthStateChange.
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session && session.user && !appLoaded) {
        authResolved = true;
        clearTimeout(redirectTimer);
        showApp(session.user);
      }
    });
  </script>
</body>
</html>
